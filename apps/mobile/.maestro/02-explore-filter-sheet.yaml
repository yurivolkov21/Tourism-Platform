# N2 Explore filter bottom sheet. Start with the app open in Expo Go.
# UNVERIFIED (see README).
appId: host.exp.exponent
---
- tapOn: 'Explore'
- tapOn:
    id: 'open-filters'
# Filter sheet is open — its Duration section is visible.
- assertVisible: 'Duration'
- tapOn:
    id: 'duration-1'
- tapOn:
    id: 'apply-filters'
# Sheet dismissed; the Filters button now carries the active-count badge.
- assertVisible: 'Filters (1)'
# Clear it again.
- tapOn: 'Clear all'
- assertVisible: 'Filters'
