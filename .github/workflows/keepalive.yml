name: keepalive

# Pings the API's readiness endpoint to keep the free Render service awake (spins
# down after 15 min idle) AND the free Supabase project active (pauses after ~7
# days idle — /health runs a SELECT 1). See docs/05-runbooks/deploy.md.
#
# Schedule is restricted to UTC 00:00–16:59 (≈ VN 07:00–23:59) so we stay well
# under Render's 750 free instance-hours/month (~527h) instead of 24/7 (~744h).
# GitHub-scheduled runs are best-effort (can be delayed/skipped under load, and
# auto-disable after 60 days of repo inactivity) — cron-job.org is the more
# reliable alternative documented in the runbook.
#
# Setup: repo Settings → Secrets and variables → Actions → Variables →
#   API_HEALTH_URL = https://<your-render-service>.onrender.com/api/v1/health

on:
  schedule:
    - cron: "*/10 0-16 * * *"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: keepalive
  cancel-in-progress: true

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /health (retry through cold start)
        run: |
          URL="${{ vars.API_HEALTH_URL }}"
          if [ -z "$URL" ]; then
            echo "::warning::API_HEALTH_URL variable not set — skipping ping."
            exit 0
          fi
          # --retry rides out the ~1 min cold start when the service was asleep.
          curl -fsS --retry 4 --retry-all-errors --retry-delay 20 --max-time 75 "$URL"
          echo "\nPinged $URL"
