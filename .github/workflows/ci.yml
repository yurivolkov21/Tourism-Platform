name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: lint · typecheck · test · build
    runs-on: ubuntu-latest

    # NOTE: Backend (Prisma generate/validate, Joi env placeholders) and the
    # Postman/Newman harness steps are added in P1, once apps/api has a schema.

    steps:
      - uses: actions/checkout@v4

      # No `version:` — pnpm/action-setup@v4 reads it from the `packageManager`
      # field in package.json (specifying both triggers ERR_PNPM_BAD_PM_VERSION).
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Prisma client isn't committed — generate before typecheck/build (no DB needed).
      - name: Generate Prisma client
        run: pnpm --filter @tourism/api exec prisma generate

      # Greenfield: run every project. Switch to `nx affected` (+ nrwl/nx-set-shas)
      # once the graph is large enough for it to pay off.
      - name: Lint · typecheck · test
        run: pnpm nx run-many -t lint typecheck test

      # The mobile app's `build` target is an Expo EAS cloud build (needs eas-cli
      # + credentials) — not a per-push CI concern. Mobile is still covered by
      # lint/typecheck/test above.
      - name: Build
        run: pnpm nx run-many -t build --exclude=@tourism/mobile
