packages:
  - 'apps/*'
  - 'libs/*'
  - 'packages/*'
  - 'libs/shared/*'
  - 'libs/web/*'
  - 'libs/mobile/ui'
# Transitive security pins (Dependabot). pnpm 11 reads `overrides` HERE, not
# package.json. Editing this alone may not re-resolve — also touch package.json
# or delete the lockfile. Remove an entry once the parent ships a patched range.
overrides:
  postcss: '^8.5.10' # GHSA-qx2v-qp2m-jg93 (XSS in CSS stringify), patched 8.5.10
  '@hono/node-server': '^1.19.13' # GHSA-92pp-h63x-v22m (serveStatic bypass), patched 1.19.13
  next: '>=16.2.5' # 14 advisories on Next.js 16 <16.2.5 (cache-poisoning/SSRF/DoS)
  uuid: '^11.1.1' # GHSA-w5hq-g745-h8pq (buffer bounds check in v3/v5/v6), patched 11.1.1
  tmp: '>=0.2.7' # GHSA-52f5-9888-34mv (path traversal), patched 0.2.7 — nx tooling
  form-data: '>=4.0.6' # GHSA-fjxv-7rqg-78g4 (CRLF injection), patched 4.0.6 — nx/axios
  js-yaml: '^4.2.0' # GHSA-h67p-54hq-rp68 (quadratic-complexity DoS in merge-key
  # handling), patched 4.2.0. Blanket: the only <4.2 copy was 3.14.2 via
  # @istanbuljs/load-nyc-config (Jest/nyc coverage tooling), which calls only
  # js-yaml.load() — present & safe-by-default in 4.x — so forcing 4.2.0 removes
  # the 3.x copy without breaking it, and Dependabot #63 auto-closes.
  'undici@6': '^6.27.0' # GHSA Set-Cookie/header-injection/WS-DoS (<6.27.0) — dev tooling copy
  'undici@7': '^7.28.0' # +SOCKS5/TLS bypass (<7.28.0) — nx (@nx/module-federation) tooling copy
  'http-proxy-middleware': '^3.0.7' # GHSA field-injection/host-matching (<3.0.7) — next/webpack dev server (stay in 3.x; 4.x is breaking)
  multer: '^2.2.0' # GHSA DoS via nested field names (<2.2.0) — @nestjs/platform-express; stay in 2.x (minor bump)
allowBuilds:
  '@parcel/watcher': true
  '@prisma/client': true
  '@prisma/engines': true
  '@scarf/scarf': false # telemetry only — no build needed
  '@swc/core': true
  detox: true
  dtrace-provider: false
  esbuild: false # transitive only; prebuilt binary, no postinstall needed
  less: false
  nx: true
  prisma: true
  sharp: true
  unrs-resolver: true
